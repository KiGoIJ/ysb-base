<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСУЛС — Учёт личного состава УСБ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #f4f6fa;
            --surface: #ffffff;
            --primary: #1a3a5c;
            --primary-light: #2a5a8c;
            --primary-dark: #0f2840;
            --accent: #3b8fc2;
            --text: #1e2a3a;
            --text-secondary: #5b6f82;
            --border: #dce3ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }
        /* ===== LAYOUT ===== */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }
        /* ===== HEADER ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: var(--primary-dark);
            color: white;
            gap: 16px;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-brand .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-brand .logo span {
            background: var(--accent);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .header-brand .sub {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .header-actions .user-badge {
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-actions .user-badge .role {
            font-weight: 500;
            color: var(--accent);
        }
        .btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 500;
        }
        .btn-primary:hover {
            background: #2f7aa8;
            border-color: #2f7aa8;
        }
        .btn-outline {
            border-color: var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--bg);
        }
        .btn-danger {
            border-color: #c0392b;
            color: #c0392b;
        }
        .btn-danger:hover {
            background: #c0392b;
            color: white;
        }
        /* ===== LOGIN FORM (inline in header) ===== */
        .login-form {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .login-form input {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            width: 130px;
            transition: var(--transition);
        }
        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .login-form input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent);
        }
        .login-form .status {
            font-size: 0.8rem;
            opacity: 0.8;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
        }
        .login-form .status.guest {
            opacity: 0.5;
        }
        .login-form .status.logged {
            opacity: 1;
            background: rgba(59, 143, 194, 0.25);
        }
        /* ===== TOOLBAR ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .toolbar .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar .left input[type="text"] {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            width: 240px;
            background: var(--bg);
            transition: var(--transition);
        }
        .toolbar .left input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 143, 194, 0.15);
        }
        .toolbar .left select {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 40px;
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--bg);
            outline: none;
            cursor: pointer;
        }
        .toolbar .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toolbar .right .badge-count {
            background: var(--bg);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        /* ===== TABLE / CARDS ===== */
        .list-container {
            padding: 20px 32px 32px;
            flex: 1;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 14px 16px;
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th:hover {
            color: var(--text);
        }
        th .sort-icon {
            margin-left: 4px;
            opacity: 0.5;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f8faff;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            background: var(--bg);
            color: var(--text-secondary);
        }
        .status-badge.blag {
            background: #e3f5e9;
            color: #1e7b4c;
        }
        .status-badge.attention {
            background: #fef3e2;
            color: #b47d2a;
        }
        .status-badge.diskred {
            background: #fde8e5;
            color: #b33c2a;
        }
        .actions-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .actions-cell .btn-small {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 4px 12px;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .actions-cell .btn-small:hover {
            background: var(--bg);
            border-color: var(--primary-light);
            color: var(--primary);
        }
        .actions-cell .btn-small.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .actions-cell .btn-small.primary:hover {
            background: var(--primary-light);
        }
        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px 0 0;
        }
        .pagination button {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--bg);
            border-color: var(--accent);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .pagination .page-info {
            padding: 0 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.25s ease;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
        }
        .modal-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .modal-header .close-btn {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0 8px;
        }
        .modal-header .close-btn:hover {
            color: var(--text);
        }
        .modal-body .field {
            display: flex;
            margin-bottom: 14px;
            align-items: baseline;
        }
        .modal-body .field label {
            width: 160px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .modal-body .field .value {
            flex: 1;
            padding-left: 12px;
            word-break: break-word;
        }
        .modal-body .field .value input,
        .modal-body .field .value select,
        .modal-body .field .value textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--bg);
            outline: none;
            transition: var(--transition);
        }
        .modal-body .field .value input:focus,
        .modal-body .field .value select:focus,
        .modal-body .field .value textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 143, 194, 0.15);
        }
        .modal-body .field .value textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal-body .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding-left: 12px;
        }
        .modal-body .checkbox-group label {
            width: auto;
            font-weight: 400;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .modal-footer {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .modal-footer .btn {
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 500;
        }
        .modal-footer .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .modal-footer .btn-secondary:hover {
            background: #e2e8f0;
        }
        .modal-footer .btn-primary {
            background: var(--primary);
        }
        .modal-footer .btn-primary:hover {
            background: var(--primary-light);
        }
        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; padding: 16px; }
            .header-actions { flex-wrap: wrap; }
            .login-form input { width: 100px; }
            .toolbar { flex-direction: column; align-items: stretch; padding: 16px; }
            .toolbar .left input[type="text"] { width: 100%; }
            .toolbar .left { flex-direction: column; align-items: stretch; }
            .modal { padding: 20px; margin: 10px; }
            .modal-body .field { flex-direction: column; align-items: stretch; }
            .modal-body .field label { width: auto; margin-bottom: 4px; }
            .modal-body .field .value { padding-left: 0; }
            .checkbox-group { padding-left: 0 !important; }
        }
        /* ===== HERB UPLOAD ===== */
        .herb-upload {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 4px 0;
        }
        .herb-upload input[type="file"] {
            font-size: 0.75rem;
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 40px;
            background: var(--bg);
        }
        .herb-upload .herb-preview {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: white;
        }
        .herb-upload .herb-preview img {
            max-width: 100%;
            max-height: 100%;
        }
        /* ===== PRINT STYLES (for modal preview) ===== */
        .print-stamp {
            display: inline-block;
            border: 3px double var(--primary);
            padding: 4px 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transform: rotate(-2deg);
            margin: 8px 0;
            font-size: 0.9rem;
            background: rgba(26, 58, 92, 0.04);
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <div class="logo">
                ⚡ АСУЛС
                <span>УСБ</span>
            </div>
            <div class="sub">Автоматизированный учёт личного состава</div>
        </div>
        <div class="header-actions">
            <!-- Login form -->
            <div class="login-form" id="loginForm">
                <input type="text" id="loginInput" placeholder="Логин">
                <input type="password" id="passInput" placeholder="Пароль">
                <button class="btn" id="loginBtn" onclick="login()">Войти</button>
                <span class="status guest" id="loginStatus">● ГОСТЬ</span>
                <button class="btn" id="logoutBtn" style="display:none;" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="left">
            <input type="text" id="searchInput" placeholder="Поиск по фамилии, псевдониму, № дела..." oninput="applyFilters()">
            <select id="statusFilter" onchange="applyFilters()">
                <option value="">Все статусы</option>
                <option value="Благонадёжен">Благонадёжен</option>
                <option value="Требует внимания">Требует внимания</option>
                <option value="Дискредитирован">Дискредитирован</option>
            </select>
            <div class="herb-upload">
                <span>🖼 Герб:</span>
                <input type="file" id="herbUpload" accept="image/*" onchange="updateHerb()">
                <div class="herb-preview" id="herbPreview">⚙</div>
            </div>
        </div>
        <div class="right">
            <span class="badge-count" id="countDisplay">0 записей</span>
            <button class="btn btn-primary" id="addBtn" style="display:none;" onclick="openAddModal()">＋ Добавить</button>
        </div>
    </div>

    <!-- LIST -->
    <div class="list-container">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('id')">№ дела <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('alias')">Псевдоним <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('surname')">Фамилия И.О. <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('rank')">Звание <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('dop')">Допуск <span class="sort-icon">↕</span></th>
                        <th onclick="sortTable('status')">Статус <span class="sort-icon">↕</span></th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- rows rendered by JS -->
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <button id="prevPage" onclick="changePage(-1)" disabled>‹ Назад</button>
            <span class="page-info" id="pageInfo">Страница 1 из 1</span>
            <button id="nextPage" onclick="changePage(1)" disabled>Вперёд ›</button>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Личное дело</h2>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- dynamic -->
        </div>
        <div class="modal-footer" id="modalFooter">
            <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
        </div>
    </div>
</div>

<script>
    // ===== DATA =====
    const USERS = {
        'admin': { password: 'admin123', role: 'Начальник УСБ', level: 5 },
        'zam': { password: 'zam123', role: 'Зам. начальника УСБ', level: 4 },
        'stoper': { password: 'stoper123', role: 'Ст. оперуполномоченный', level: 3 },
        'oper': { password: 'oper123', role: 'Оперуполномоченный', level: 2 },
        'mloper': { password: 'mloper123', role: 'Мл. оперуполномоченный', level: 1 }
    };

    let currentUser = null;
    let dela = [];
    let filteredDela = [];
    let sortField = 'id';
    let sortAsc = true;
    let currentPage = 1;
    const pageSize = 10;
    let herbImage = null;
    let currentDeloId = null;

    // Демо
    const demoNames = [
        { id:'001', alias:'Агат', surname:'Зимин', name:'Андрей', patronymic:'Викторович',
          personalNumber:'017-К', rank:'Майор', dolz:'Старший оперуполномоченный',
          dop:'Секретно', status:'Благонадёжен',
          qualAgent: true, qualSurveillance: false, qualCrypto: true,
          notes:'Рекомендован к повышению. Устойчив к психологическому давлению.',
          resolution:'Допустить к дальнейшему прохождению службы.',
          marks:'03.04.2026 – присвоено звание майор.' },
        { id:'002', alias:'Титан', surname:'Волков', name:'Сергей', patronymic:'Петрович',
          personalNumber:'112-М', rank:'Подполковник', dolz:'Начальник отдела',
          dop:'Сов. секретно', status:'Требует внимания',
          qualAgent: true, qualSurveillance: true, qualCrypto: false,
          notes:'Замечены неформальные контакты. Требуется проверка.',
          resolution:'Установить негласный контроль.',
          marks:'' },
        { id:'003', alias:'Заря', surname:'Котова', name:'Елена', patronymic:'Николаевна',
          personalNumber:'205-Ж', rank:'Капитан', dolz:'Оперуполномоченный',
          dop:'Секретно', status:'Дискредитирован',
          qualAgent: false, qualSurveillance: true, qualCrypto: false,
          notes:'Финансовые нарушения. Выписка со счетов приобщена.',
          resolution:'Отстранить от оперативной работы. Передать материалы в следственный отдел.',
          marks:'15.07.2026 – временно отстранена.' }
    ];

    // ===== INIT =====
    function loadDela() {
        const stored = localStorage.getItem('delaUSB');
        if (stored) {
            try { dela = JSON.parse(stored); } catch(e) { dela = demoNames.map(d=>({...d})); }
        } else {
            dela = demoNames.map(d=>({...d}));
        }
        saveDela();
    }
    function saveDela() {
        localStorage.setItem('delaUSB', JSON.stringify(dela));
    }

    function isLoggedIn() { return currentUser !== null; }
    function canAdd() { return isLoggedIn() && currentUser.level >= 3; }
    function canEdit() { return isLoggedIn() && currentUser.level >= 2; }
    function canDelete() { return isLoggedIn() && currentUser.level >= 4; }

    // ===== RENDER =====
    function render() {
        applyFilters();
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const statusFilter = document.getElementById('statusFilter').value;

        let filtered = dela.filter(d => {
            const matchSearch = d.id.includes(search) ||
                d.surname.toLowerCase().includes(search) ||
                d.alias.toLowerCase().includes(search) ||
                `${d.surname} ${d.name}`.toLowerCase().includes(search);
            const matchStatus = statusFilter === '' || d.status === statusFilter;
            return matchSearch && matchStatus;
        });

        // Sort
        filtered.sort((a, b) => {
            let valA = a[sortField] || '';
            let valB = b[sortField] || '';
            if (typeof valA === 'string') valA = valA.toLowerCase();
            if (typeof valB === 'string') valB = valB.toLowerCase();
            if (valA < valB) return sortAsc ? -1 : 1;
            if (valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });

        filteredDela = filtered;
        currentPage = 1;
        renderPage();
    }

    function renderPage() {
        const total = filteredDela.length;
        const totalPages = Math.ceil(total / pageSize) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * pageSize;
        const end = Math.min(start + pageSize, total);
        const pageData = filteredDela.slice(start, end);

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-secondary);">Записей не найдено</td></tr>`;
        } else {
            pageData.forEach(d => {
                const shortName = `${d.surname} ${d.name.charAt(0)}.${d.patronymic ? ' '+d.patronymic.charAt(0)+'.' : ''}`;
                const statusClass = d.status === 'Благонадёжен' ? 'blag' : (d.status === 'Требует внимания' ? 'attention' : 'diskred');
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${d.id}</strong></td>
                    <td>${d.alias}</td>
                    <td>${shortName}</td>
                    <td>${d.rank}</td>
                    <td>${d.dop}</td>
                    <td><span class="status-badge ${statusClass}">${d.status}</span></td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn-small primary" onclick="openDelo('${d.id}')">Открыть</button>
                            ${canEdit() ? `<button class="btn-small" onclick="editDelo('${d.id}')">✎</button>` : ''}
                            ${canDelete() ? `<button class="btn-small" style="color:#c0392b;" onclick="deleteDelo('${d.id}')">✕</button>` : ''}
                            <button class="btn-small" onclick="printDelo('${d.id}')">🖨</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Pagination info
        document.getElementById('pageInfo').textContent = `Страница ${currentPage} из ${totalPages}`;
        document.getElementById('prevPage').disabled = currentPage <= 1;
        document.getElementById('nextPage').disabled = currentPage >= totalPages;
        document.getElementById('countDisplay').textContent = `${total} записей`;

        updateUIBasedOnRole();
    }

    function changePage(delta) {
        const totalPages = Math.ceil(filteredDela.length / pageSize) || 1;
        const newPage = currentPage + delta;
        if (newPage >= 1 && newPage <= totalPages) {
            currentPage = newPage;
            renderPage();
        }
    }

    function sortTable(field) {
        if (sortField === field) {

            sortAsc = true;
        }

        const id = document.getElementById('newId').value.trim();

        if (dela.find(d => d.id === id)) { alert('Дело с таким номером уже существует'); return; }
        const get = id => document.getElementById(id)?.value.trim() || '';

        const newDelo = {
            id,
            surname: get('newSurname'), name: get('newName'), patronymic: get('newPatronymic'),
            alias: get('newAlias'), personalNumber: get('newPersonalNumber'),
            dolz: get('newDolz'), rank: get('newRank'),
            dop: document.getElementById('newDop')?.value || 'Секретно',
            qualAgent: check('newQualAgent'), qualSurveillance: check('newQualSurveillance'),
            qualCrypto: check('newQualCrypto'),
            notes: get('newNotes'), resolution: get('newResolution'), marks: get('newMarks'),
            status: document.getElementById('newStatus')?.value || 'Благонадёжен'
        };
        dela.push(newDelo);
        saveDela();
        render();
        closeModal();
    }

            <div>Начальник Управления</div>
            <div>по Ленинградской области и г. Зареченск</div>
            <div>полковник Кудышев К.В.</div>
            <div class="line">(подпись)</div>
            <div class="stamp-round">М.П.</div>
        </div>
    </div>
</div>
</body></html>`;
        win.document.write(doc);
        win.document.close();
    }

    // ===== HERB UPLOAD =====
    function updateHerb() {
        const file = document.getElementById('herbUpload').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                herbImage = e.target.result;
                document.getElementById('herbPreview').innerHTML = `<img src="${herbImage}" alt="герб">`;
            };
            reader.readAsDataURL(file);
        }
    }

    // ===== AUTH =====
    function login() {
        const login = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        if (USERS[login] && USERS[login].password === pass) {
            currentUser = { login, role: USERS[login].role, level: USERS[login].level };
            document.getElementById('loginStatus').textContent = `● ${currentUser.role}`;
            document.getElementById('loginStatus').className = 'status logged';
            document.getElementById('logoutBtn').style.display = 'inline-flex';
            document.getElementById('loginInput').value = '';
            document.getElementById('passInput').value = '';
            updateUIBasedOnRole();
            render();
        } else {
            alert('Неверный логин или пароль');
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('loginStatus').textContent = '● ГОСТЬ';
        document.getElementById('loginStatus').className = 'status guest';
        document.getElementById('logoutBtn').style.display = 'none';
        updateUIBasedOnRole();
        render();
    }

    function updateUIBasedOnRole() {
        const addBtn = document.getElementById('addBtn');
        if (canAdd()) addBtn.style.display = 'inline-flex';
        else addBtn.style.display = 'none';
    }

    // ===== CLOSE MODAL ON OVERLAY =====
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ===== INIT =====
    loadDela();
    render();
    updateUIBasedOnRole();

    // Handle Enter key for login
    document.getElementById('passInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
