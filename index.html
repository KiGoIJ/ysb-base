<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСУЛС – Модуль УСБ ТУ ФСБ</title>
    <style>
        :root {
            --bg: #F6F2EE;
            --surface: #FFFFFF;
            --border: #B3B9C1;
            --text: #323841;
            --text-secondary: #77726E;
            --accent: #323841;
            --accent-light: #CACBCD;
            --shadow: rgba(50, 56, 65, 0.08);
            --stamp-color: #323841;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            padding: 30px 20px;
            min-height: 100vh;
            background-image: linear-gradient(rgba(50,56,65,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(50,56,65,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 8px 24px var(--shadow);
            padding: 30px 35px;
            border-radius: 2px;
        }
        header {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.7em;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
        }
        header .subtitle {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-panel {
            text-align: right;
            margin-bottom: 25px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }
        .login-panel input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.9em;
            outline: none;
            width: 180px;
            border-radius: 2px;
        }
        .login-panel input:focus {
            border-color: var(--accent);
        }
        .login-panel button {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #FFFFFF;
            padding: 6px 18px;
            font-family: inherit;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
        }
        .login-panel button:hover {
            background: #1d2229;
            border-color: #1d2229;
        }
        .status {
            font-weight: bold;
            font-size: 0.85em;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 2px;
            background: var(--bg);
            border: 1px solid var(--border);
        }
        .access-guest { color: var(--text-secondary); }
        .access-usb { color: var(--accent); background: #EAE9E7; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9em;
        }
        th {
            text-align: left;
            background: var(--bg);
            padding: 12px 10px;
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        td {
            padding: 10px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        tr:hover td {
            background: #F0EEEA;
        }
        .actions button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            padding: 4px 12px;
            margin-right: 6px;
            cursor: pointer;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 2px;
            transition: 0.2s;
        }
        .actions button:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }
        .add-btn {
            margin: 18px 0 8px;
            display: inline-block;
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #FFFFFF;
            padding: 8px 22px;
            font-family: inherit;
            font-size: 0.9em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
        }
        .add-btn:hover {
            background: #1d2229;
            border-color: #1d2229;
        }
        /* Печать (штамп) */
        .stamp {
            display: inline-block;
            border: 3px double var(--stamp-color);
            color: var(--stamp-color);
            padding: 6px 20px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transform: rotate(-3deg);
            opacity: 0.85;
            margin: 12px 0;
            font-size: 1em;
            background: rgba(50,56,65,0.02);
            border-radius: 4px;
            box-shadow: 0 0 0 1px var(--stamp-color);
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(50,56,65,0.5);
        }
        .modal-content {
            background: var(--surface);
            margin: 3% auto;
            padding: 30px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            color: var(--text);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            position: relative;
            font-size: 0.9em;
            border-radius: 2px;
        }
        .modal-content h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 12px;
            margin-bottom: 25px;
            color: var(--accent);
        }
        .close {
            position: absolute;
            right: 18px;
            top: 14px;
            font-size: 1.6em;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
        }
        .close:hover { color: var(--accent); }
        .field {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
        }
        .field label {
            width: 190px;
            color: var(--text-secondary);
            font-weight: bold;
            letter-spacing: 0.8px;
            font-size: 0.85em;
            text-transform: uppercase;
        }
        .field span, .field input, .field textarea, .field select {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.9em;
            border-radius: 2px;
        }
        .field textarea {
            resize: vertical;
            min-height: 65px;
        }
        .gost-button {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #FFFFFF;
            padding: 8px 20px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
            margin-right: 10px;
            border-radius: 2px;
        }
        .gost-button:hover {
            background: #1d2229;
        }
        hr {
            border-color: var(--border);
            margin: 25px 0;
        }
        .hidden {
            display: none;
        }
        .status-badge {
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .status-badge.blag { color: var(--text); }
        .status-badge.attention { color: #5f5b57; font-style: italic; }
        .status-badge.diskred { color: #8b8680; text-decoration: line-through; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>▮ АСУЛС – Модуль УСБ ТУ ФСБ</h1>
        <div class="subtitle">Автоматизированная система учёта личного состава · Совершенно секретно</div>
    </header>

    <div class="login-panel">
        <input type="password" id="passInput" placeholder="Код доступа УСБ">
        <button onclick="login()">Войти</button>
        <span id="loginStatus" class="status access-guest">● ГОСТЬ (ограниченный доступ)</span>
        <button id="logoutBtn" class="hidden" onclick="logout()">Выйти</button>
    </div>

    <div id="app">
        <table id="tableDela">
            <thead>
                <tr>
                    <th>№ дела</th>
                    <th>Псевдоним</th>
                    <th>Ф.И.О.</th>
                    <th>Допуск</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="add-btn hidden" id="addBtn" onclick="openAddModal()">＋ Зарегистрировать дело</button>
    </div>
</div>

<!-- Модальное окно просмотра/редактирования -->
<div id="modalDela" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">Личное дело №</h2>
        <div id="modalBody"></div>
        <div id="modalEditSection" class="hidden"></div>
    </div>
</div>

<!-- Модальное окно добавления -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAddModal()">&times;</span>
        <h2>Регистрация нового личного дела</h2>
        <div id="addForm"></div>
        <button class="gost-button" onclick="createDelo()">Зарегистрировать</button>
    </div>
</div>

<script>
    const USB_PASSWORD = "Агат2026";
    let isUSB = false;
    let currentDeloId = null;
    let dela = [];

    const demoNames = [
        {id:'001', alias:'Агат', name:'Зимин А.В.', birth:1985, dolz:'Ст. оперуполномоченный', dop:'Секретно', status:'Благонадёжен', notes:'Рекомендован к повышению.', kompromat:'Не обнаружен.', resolution:'Без замечаний.'},
        {id:'002', alias:'Титан', name:'Волков С.П.', birth:1979, dolz:'Начальник отдела', dop:'Сов. секретно', status:'Требует внимания', notes:'Замечены неформальные контакты.', kompromat:'Фото с закрытой встречи.', resolution:'Установить наблюдение.'},
        {id:'003', alias:'Заря', name:'Котова Е.Н.', birth:1990, dolz:'Оперуполномоченный', dop:'Секретно', status:'Дискредитирован', notes:'Финансовые нарушения.', kompromat:'Выписка со счетов.', resolution:'Отстранить от оперативной работы.'}
    ];

    function loadDela() {
        const stored = localStorage.getItem('delaUSB');
        if (stored) {
            dela = JSON.parse(stored);
        } else {
            dela = demoNames.map(d => ({...d}));
            saveDela();
        }
    }
    function saveDela() {
        localStorage.setItem('delaUSB', JSON.stringify(dela));
    }

    function statusBadge(status) {
        let cls = '';
        if (status === 'Благонадёжен') cls = 'blag';
        else if (status === 'Требует внимания') cls = 'attention';
        else if (status === 'Дискредитирован') cls = 'diskred';
        return `<span class="status-badge ${cls}">${status}</span>`;
    }

    function renderTable() {
        const tbody = document.querySelector('#tableDela tbody');
        tbody.innerHTML = '';
        dela.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d.id}</td>
                <td><strong>${d.alias}</strong></td>
                <td>${d.name}</td>
                <td>${d.dop}</td>
                <td>${statusBadge(d.status)}</td>
                <td class="actions">
                    <button onclick="openDelo('${d.id}')">Просмотр</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openDelo(id) {
        const delo = dela.find(d => d.id === id);
        if (!delo) return;
        currentDeloId = id;
        document.getElementById('modalTitle').textContent = `Личное дело № ${delo.id} · псевдоним «${delo.alias}»`;
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="stamp">${delo.dop.toUpperCase()}</div>
            <div class="field"><label>Ф.И.О.:</label><span>${delo.name}</span></div>
            <div class="field"><label>Год рождения:</label><span>${delo.birth}</span></div>
            <div class="field"><label>Должность:</label><span>${delo.dolz}</span></div>
            <div class="field"><label>Уровень допуска:</label><span>${delo.dop}</span></div>
            <div class="field"><label>Статус:</label><span>${statusBadge(delo.status)}</span></div>
            <div class="field"><label>Особые отметки:</label><span>${delo.notes || '—'}</span></div>
            <div class="field"><label>Компромат:</label><span>${delo.kompromat || '—'}</span></div>
            <div class="field"><label>Резолюция УСБ:</label><span>${delo.resolution || 'Без замечаний.'}</span></div>
        `;
        const editSection = document.getElementById('modalEditSection');
        if (isUSB) {
            editSection.innerHTML = `
                <button class="gost-button" onclick="enableEditMode()">✎ Редактировать</button>
                <button class="gost-button" style="background:#5a5552; border-color:#5a5552;" onclick="deleteDelo()">Удалить</button>
            `;
            editSection.classList.remove('hidden');
        } else {
            editSection.classList.add('hidden');
        }
        document.getElementById('modalDela').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modalDela').style.display = 'none';
        currentDeloId = null;
    }

    function enableEditMode() {
        if (!isUSB || !currentDeloId) return;
        const delo = dela.find(d => d.id === currentDeloId);
        if (!delo) return;
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="field"><label>Ф.И.О.:</label><input id="editName" value="${delo.name}"></div>
            <div class="field"><label>Год рождения:</label><input id="editBirth" value="${delo.birth}"></div>
            <div class="field"><label>Должность:</label><input id="editDolz" value="${delo.dolz}"></div>
            <div class="field"><label>Допуск:</label><select id="editDop">
                <option ${delo.dop==='ДСП'?'selected':''}>ДСП</option>
                <option ${delo.dop==='Секретно'?'selected':''}>Секретно</option>
                <option ${delo.dop==='Сов. секретно'?'selected':''}>Сов. секретно</option>
                <option ${delo.dop==='ОВ'?'selected':''}>ОВ</option>
            </select></div>
            <div class="field"><label>Статус:</label><select id="editStatus">
                <option ${delo.status==='Благонадёжен'?'selected':''}>Благонадёжен</option>
                <option ${delo.status==='Требует внимания'?'selected':''}>Требует внимания</option>
                <option ${delo.status==='Дискредитирован'?'selected':''}>Дискредитирован</option>
            </select></div>
            <div class="field"><label>Особые отметки:</label><textarea id="editNotes">${delo.notes || ''}</textarea></div>
            <div class="field"><label>Компромат:</label><textarea id="editKompromat">${delo.kompromat || ''}</textarea></div>
            <div class="field"><label>Резолюция УСБ:</label><textarea id="editResolution">${delo.resolution || ''}</textarea></div>
        `;
    }

    function saveEdit() {
        if (!isUSB || !currentDeloId) return;
        const delo = dela.find(d => d.id === currentDeloId);
        if (!delo) return;
        const nameEl = document.getElementById('editName');
        if (nameEl) {
            delo.name = nameEl.value;
            delo.birth = document.getElementById('editBirth').value;
            delo.dolz = document.getElementById('editDolz').value;
            delo.dop = document.getElementById('editDop').value;
            delo.status = document.getElementById('editStatus').value;
            delo.notes = document.getElementById('editNotes').value;
            delo.kompromat = document.getElementById('editKompromat').value;
            delo.resolution = document.getElementById('editResolution').value;
        }
        saveDela();
        renderTable();
        closeModal();
        alert('Личное дело обновлено.');
    }

    function deleteDelo() {
        if (!isUSB || !currentDeloId) return;
        if (!confirm('Удалить личное дело №' + currentDeloId + ' безвозвратно?')) return;
        dela = dela.filter(d => d.id !== currentDeloId);
        saveDela();
        renderTable();
        closeModal();
    }

    function openAddModal() {
        if (!isUSB) return;
        document.getElementById('addForm').innerHTML = `
            <div class="field"><label>Номер дела:</label><input id="newId" placeholder="001"></div>
            <div class="field"><label>Псевдоним:</label><input id="newAlias" placeholder="Агат"></div>
            <div class="field"><label>Ф.И.О.:</label><input id="newName" placeholder="Зимин А.В."></div>
            <div class="field"><label>Год рождения:</label><input id="newBirth" placeholder="1985"></div>
            <div class="field"><label>Должность:</label><input id="newDolz" placeholder="Ст. оперуполномоченный"></div>
            <div class="field"><label>Допуск:</label><select id="newDop">
                <option>ДСП</option><option selected>Секретно</option><option>Сов. секретно</option><option>ОВ</option>
            </select></div>
            <div class="field"><label>Статус:</label><select id="newStatus">
                <option selected>Благонадёжен</option><option>Требует внимания</option><option>Дискредитирован</option>
            </select></div>
            <div class="field"><label>Особые отметки:</label><textarea id="newNotes"></textarea></div>
            <div class="field"><label>Компромат:</label><textarea id="newKompromat"></textarea></div>
            <div class="field"><label>Резолюция УСБ:</label><textarea id="newResolution">Без замечаний.</textarea></div>
        `;
        document.getElementById('addModal').style.display = 'block';
    }

    function closeAddModal() {
        document.getElementById('addModal').style.display = 'none';
    }

    function createDelo() {
        const id = document.getElementById('newId').value.trim();
        if (!id) { alert('Введите номер дела'); return; }
        if (dela.find(d => d.id === id)) { alert('Дело с таким номером уже существует'); return; }
        const newDelo = {
            id: id,
            alias: document.getElementById('newAlias').value.trim(),
            name: document.getElementById('newName').value.trim(),
            birth: document.getElementById('newBirth').value.trim(),
            dolz: document.getElementById('newDolz').value.trim(),
            dop: document.getElementById('newDop').value,
            status: document.getElementById('newStatus').value,
            notes: document.getElementById('newNotes').value.trim(),
            kompromat: document.getElementById('newKompromat').value.trim(),
            resolution: document.getElementById('newResolution').value.trim()
        };
        dela.push(newDelo);
        saveDela();
        renderTable();
        closeAddModal();
    }

    function login() {
        const pass = document.getElementById('passInput').value.trim();
        if (pass === USB_PASSWORD) {
            isUSB = true;
            document.getElementById('loginStatus').textContent = '● УСБ (полный доступ)';
            document.getElementById('loginStatus').className = 'status access-usb';
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('addBtn').classList.remove('hidden');
            document.getElementById('passInput').value = '';
            renderTable();
        } else {
            alert('Неверный код доступа');
        }
    }

    function logout() {
        isUSB = false;
        document.getElementById('loginStatus').textContent = '● ГОСТЬ (ограниченный доступ)';
        document.getElementById('loginStatus').className = 'status access-guest';
        document.getElementById('logoutBtn').classList.add('hidden');
        document.getElementById('addBtn').classList.add('hidden');
        document.getElementById('passInput').value = '';
        closeModal();
        closeAddModal();
        renderTable();
    }

    window.onclick = function(event) {
        if (event.target === document.getElementById('modalDela')) closeModal();
        if (event.target === document.getElementById('addModal')) closeAddModal();
    }

    loadDela();
    renderTable();
</script>
</body>
</html>
